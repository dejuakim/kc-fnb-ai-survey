<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 교육 사전 설문</title>

<style>
    body{
        font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        background:#f5f5f5;
        padding:40px;
        color:#333;
        line-height:1.6;
    }

    .container{
        max-width:800px;
        margin:auto;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    h1{
        margin-bottom:10px;
        font-size:32px;
    }

    .description{
        color:#666;
        margin-bottom:40px;
    }

    .section{
        margin-bottom:40px;
    }

    .section h2{
        font-size:22px;
        margin-bottom:20px;
        padding-bottom:10px;
        border-bottom:2px solid #f0f0f0;
    }

    label{
        display:block;
        margin-bottom:18px;
        font-weight:500;
    }

    input[type="text"],
    textarea,
    select{
        width:100%;
        padding:14px;
        margin-top:8px;
        border:1px solid #ddd;
        border-radius:10px;
        font-size:15px;
        box-sizing:border-box;
    }

    textarea{
        min-height:140px;
        resize:vertical;
    }

    .checkbox-group{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
        margin-top:10px;
    }

    .checkbox-item{
        background:#fafafa;
        border:1px solid #eee;
        border-radius:10px;
        padding:14px;
        font-weight:400;
    }

    button{
        background:#111;
        color:white;
        border:none;
        padding:16px 28px;
        border-radius:12px;
        font-size:16px;
        cursor:pointer;
        width:100%;
    }

    button:hover{
        opacity:0.9;
    }

    @media(max-width:768px){
        .checkbox-group{
            grid-template-columns:1fr;
        }

        .container{
            padding:24px;
        }
    }
</style>
</head>

<body>

<div class="container">

<h1>AI 교육 사전 설문</h1>

<p class="description">
본 설문은 기업 맞춤형 AI 교육 커리큘럼 제작을 위해 진행됩니다.<br>
응답해주신 내용을 바탕으로 실무 중심의 교육을 준비할 예정입니다.
</p>

<form action="https://formsubmit.co/dejuakim@gmail.com" method="POST">
<input type="hidden" name="_subject" value="AI 교육 사전 설문 응답이 도착했습니다.">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_captcha" value="false">


<div class="section">
<h2>1. 회사 / 브랜드 정보</h2>

<label>
회사명
<input type="text" name="company_name">
</label>

<label>
브랜드명
<input type="text" name="brand_name">
</label>

<label>
주요 메뉴 / 제품
<input type="text" name="main_product">
</label>

<label>
주요 타겟 고객층
<input type="text" name="target_customer">
</label>

<label>
현재 운영 중인 SNS 채널
<input type="text" name="sns_channel">
</label>

<label>
현재 가장 중요하게 생각하는 마케팅 채널
<input type="text" name="marketing_channel">
</label>
</div>

<div class="section">
<h2>2. AI 활용 목적 (복수 선택 가능)</h2>

<div class="checkbox-group">

<label class="checkbox-item">
<input type="checkbox"> 인스타그램 콘텐츠 제작
</label>

<label class="checkbox-item">
<input type="checkbox"> 메뉴 사진 제작 / 보정
</label>

<label class="checkbox-item">
<input type="checkbox"> 광고 디자인 제작
</label>

<label class="checkbox-item">
<input type="checkbox"> 이벤트 홍보 콘텐츠 제작
</label>

<label class="checkbox-item">
<input type="checkbox"> PPT 제안서 제작
</label>

<label class="checkbox-item">
<input type="checkbox"> 신메뉴 기획
</label>

<label class="checkbox-item">
<input type="checkbox"> 블로그 / SNS 글쓰기
</label>

<label class="checkbox-item">
<input type="checkbox"> 업무 자동화
</label>

<label class="checkbox-item">
<input type="checkbox"> 데이터 분석
</label>

<label class="checkbox-item">
<input type="checkbox"> 기타
</label>

</div>
</div>

<div class="section">
<h2>3. 현재 가장 어려운 부분</h2>

<div class="checkbox-group">

<label class="checkbox-item">
<input type="checkbox"> 콘텐츠 아이디어 부족
</label>

<label class="checkbox-item">
<input type="checkbox"> 디자인 제작 시간
</label>

<label class="checkbox-item">
<input type="checkbox"> 사진 촬영 비용
</label>

<label class="checkbox-item">
<input type="checkbox"> SNS 운영
</label>

<label class="checkbox-item">
<input type="checkbox"> 광고 효율
</label>

<label class="checkbox-item">
<input type="checkbox"> 문서 작업
</label>

<label class="checkbox-item">
<input type="checkbox"> 브랜드 일관성 유지
</label>

<label class="checkbox-item">
<input type="checkbox"> 기타
</label>

</div>
</div>

<div class="section">
<h2>4. 교육 대상자 정보</h2>

<label>
참석 인원
<input type="text" name="attendees">
</label>

<label>
직무 구성
<input type="text" placeholder="예: 마케팅 / 운영 / 점장 / 디자이너 / 대표 등">
</label>

<label>
AI 사용 경험
<select>
<option>없음</option>
<option>기초 수준</option>
<option>현재 사용 중</option>
</select>
</label>

</div>

<div class="section">
<h2>5. 희망 교육 방향</h2>

<div class="checkbox-group">

<label class="checkbox-item">
<input type="checkbox"> 실습 중심
</label>

<label class="checkbox-item">
<input type="checkbox"> 사례 중심
</label>

<label class="checkbox-item">
<input type="checkbox"> 툴 활용 중심
</label>

<label class="checkbox-item">
<input type="checkbox"> 전략 중심
</label>

<label class="checkbox-item">
<input type="checkbox"> 초보자 대상
</label>

<label class="checkbox-item">
<input type="checkbox"> 심화 활용
</label>

</div>
</div>

<div class="section">
<h2>6. 교육에서 배우고 싶은 내용</h2>

<textarea placeholder="교육에서 배우고 싶은 내용을 자유롭게 작성해주세요."></textarea>
</div>

<button type="submit">설문 제출하기</button>

</form>

</div>

</body>
</html>
